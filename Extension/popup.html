<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn to Affinity</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
      width: 320px;
      padding: 20px;
      background: #ffffff;
      color: #1d1d1f;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid #e5e5e7;
    }

    .header svg {
      width: 32px;
      height: 32px;
      color: #0a66c2;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    .header p {
      font-size: 12px;
      color: #86868b;
      margin-top: 2px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #1d1d1f;
      margin-bottom: 6px;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: #0a66c2;
      box-shadow: 0 0 0 3px rgba(10, 102, 194, 0.1);
    }

    .subdomain-input-group {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .subdomain-input-group input {
      border-top-right-radius: 0;
      border-bottom-right-radius: 0;
      flex: 1;
    }

    .subdomain-suffix {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      font-size: 14px;
      color: #86868b;
      background: #f5f5f7;
      border: 1px solid #d2d2d7;
      border-left: none;
      border-radius: 0 8px 8px 0;
    }

    .field-hint {
      font-size: 11px;
      color: #86868b;
      margin-top: 4px;
    }

    .button-group {
      display: flex;
      gap: 8px;
    }

    button {
      flex: 1;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }

    button:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: #0a66c2;
      color: white;
    }

    .btn-primary:hover {
      background: #004182;
    }

    .btn-secondary {
      background: #f5f5f7;
      color: #1d1d1f;
    }

    .btn-secondary:hover {
      background: #e8e8ed;
    }

    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }

    .status.success {
      display: block;
      background: #d4edda;
      color: #155724;
    }

    .status.error {
      display: block;
      background: #f8d7da;
      color: #721c24;
    }

    .status.info {
      display: block;
      background: #e7f3ff;
      color: #004182;
    }

    .connection-status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      padding: 12px;
      background: #f5f5f7;
      border-radius: 8px;
      font-size: 13px;
    }

    .connection-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #86868b;
    }

    .connection-dot.connected {
      background: #34c759;
    }

    .connection-dot.error {
      background: #ff3b30;
    }

    .stats-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
      padding: 10px 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      color: white;
      animation: statsSlideIn 0.3s ease;
    }

    @keyframes statsSlideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .stats-icon {
      font-size: 14px;
    }

    .help-text {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e5e5e7;
      font-size: 12px;
      color: #86868b;
    }

    .help-text a {
      color: #0a66c2;
      text-decoration: none;
    }

    .help-text a:hover {
      text-decoration: underline;
    }

    .shortcut {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 8px;
    }

    kbd {
      display: inline-block;
      padding: 2px 6px;
      font-family: -apple-system, BlinkMacSystemFont, monospace;
      font-size: 11px;
      background: #f5f5f7;
      border: 1px solid #d2d2d7;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M22 2L11 13"></path>
      <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
    </svg>
    <div>
      <h1>LinkedIn to Affinity</h1>
      <p>Send conversations to your CRM</p>
    </div>
  </div>

  <div class="form-group">
    <label for="apiKey">Affinity API Key</label>
    <input type="password" id="apiKey" placeholder="Enter your API key">
  </div>

  <div class="form-group">
    <label for="affinitySubdomain">Affinity Subdomain</label>
    <div class="subdomain-input-group">
      <input type="text" id="affinitySubdomain" placeholder="app">
      <span class="subdomain-suffix">.affinity.co</span>
    </div>
    <p class="field-hint">Your Affinity URL (e.g., triptyq for triptyq.affinity.co)</p>
  </div>

  <div class="button-group">
    <button class="btn-primary" id="saveBtn">Save</button>
    <button class="btn-secondary" id="testBtn">Test</button>
  </div>

  <div class="status" id="status"></div>

  <div class="connection-status" id="connectionStatus">
    <span class="connection-dot" id="connectionDot"></span>
    <span id="connectionText">Not configured</span>
  </div>

  <div class="stats-badge" id="statsBadge" style="display: none;">
    <span class="stats-icon">✨</span>
    <span id="statsText">0 contacts synced</span>
  </div>

  <div class="help-text">
    <p>Find your API key in Affinity under Settings → API.</p>
    <p>Your subdomain is the first part of your Affinity URL.</p>
    <div class="shortcut">
      <span>Shortcut:</span>
      <kbd>Cmd</kbd> + <kbd>Shift</kbd> + <kbd>A</kbd>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
